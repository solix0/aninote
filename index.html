<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="logo.png">
    <title>AniNote</title>
    <style>
        /* ===== СТРОГИЙ ЧОРНО-БІЛО-СІРИЙ МІНІМАЛІЗМ ===== */
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1e1e1e;
            --border: #2e2e2e;
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            --badge-bg: #222222;
            --modal-glass: rgba(20, 20, 20, 0.92);
            --modal-border: rgba(255, 255, 255, 0.12);
            --status-watching: #4CAF50;
            --status-watched: #666666;
            --status-planned: #FFA726;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 48px 20px;
        }

        .app {
            max-width: 760px;
            width: 100%;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-symbol {
            font-size: 20px;
        }

        .stats {
            font-size: 15px;
            color: var(--text-muted);
            background: var(--surface);
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .stats strong {
            color: var(--text-main);
        }

        /* ===== СТВОРЕННЯ КАТЕГОРІЇ ===== */
        .add-cat-form {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }

        .add-cat-form input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            min-width: 0;
        }

        .add-cat-form input::placeholder {
            color: var(--text-muted);
        }

        .add-cat-form input:focus {
            border-color: #ffffff;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 15px;
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-primary {
            background: #ffffff;
            border-color: #ffffff;
            color: #000000;
        }

        .btn-primary:hover {
            background: #e0e0e0;
            border-color: #e0e0e0;
        }

        /* ===== ПАНЕЛЬ КЕРУВАННЯ ===== */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .control-bar h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .control-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 8px;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .btn-sm:hover {
            background: var(--surface-hover);
            color: var(--text-main);
            border-color: #555555;
        }

        .btn-install {
            color: #ffffff;
            border-color: #555555;
            background: #1a1a1a;
            display: none;
        }

        .btn-install:hover {
            background: #ffffff;
            color: #000000;
        }

        .btn-danger-text:hover {
            color: #ffffff;
            border-color: #ffffff;
            background: #1e1e1e;
        }

        /* ===== КАТЕГОРІЇ ТА СПИСКИ ===== */
        .categories-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .category-block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: border-color 0.2s, opacity 0.2s, transform 0.2s;
            cursor: default;
        }

        .category-block.dragging {
            opacity: 0.4;
            transform: scale(0.98);
        }

        .category-block.drag-over {
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: border-bottom-color 0.3s ease;
        }

        .category-block.open .category-header {
            border-bottom-color: var(--border);
        }

        .category-title-group {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .arrow-toggle {
            font-size: 13px;
            color: var(--text-muted);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            flex-shrink: 0;
            width: 18px;
            text-align: center;
            font-weight: 300;
        }

        .category-block.open .arrow-toggle {
            transform: rotate(90deg);
        }

        .category-name {
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--badge-bg);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .category-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .cat-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.15s;
            user-select: none;
            touch-action: none;
            flex-shrink: 0;
        }

        .cat-btn:hover:not(:disabled) {
            color: #ffffff;
            border-color: #555555;
            background: var(--surface-hover);
        }

        .cat-btn:disabled {
            opacity: 0.2;
            cursor: default;
            border-color: var(--border) !important;
            color: var(--text-muted) !important;
            background: none !important;
        }

        .cat-btn.drag-handle {
            cursor: grab;
            touch-action: none;
            font-size: 16px;
        }

        .cat-btn.drag-handle:active {
            cursor: grabbing;
        }

        .cat-btn.drag-handle:hover:not(:disabled) {
            cursor: grab;
        }

        /* ТІЛО КАТЕГОРІЇ (СХОВАНЕ/ВІДКРИТЕ) */
        .category-body {
            display: none;
            padding: 16px 20px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-block.open .category-body {
            display: block;
        }

        .add-item-form {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            width: 100%;
        }

        .add-item-form input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            color: #ffffff;
            outline: none;
            min-width: 0;
        }

        .add-item-form input:focus {
            border-color: #555555;
        }

        .add-item-form select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            color: #ffffff;
            outline: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .add-item-form button {
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            min-height: 44px;
            min-width: 44px;
        }

        .add-item-form button:hover {
            background: #e0e0e0;
        }

        /* СПИСОК АНІМЕ ВСЕРЕДИНІ КАТЕГОРІЇ */
        .anime-sublist {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .anime-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .anime-card:hover {
            border-color: #555555;
            background: var(--surface-hover);
        }

        .anime-card.watched {
            opacity: 0.55;
        }

        .anime-card.watched .anime-title {
            color: var(--text-muted);
        }

        .anime-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .anime-status {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 700;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .anime-status.status-watching {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .anime-status.status-planned {
            background: rgba(255, 167, 38, 0.2);
            color: #FFA726;
            border: 1px solid rgba(255, 167, 38, 0.3);
        }

        .anime-status.status-watched {
            background: rgba(136, 136, 136, 0.15);
            color: #888888;
            border: 1px solid rgba(136, 136, 136, 0.2);
        }

        .anime-title {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s ease;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            color: #ffffff;
        }

        .empty-substate {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 14px;
            border: 1px dashed var(--border);
            border-radius: 10px;
        }

        /* ===== ПОРОЖНІЙ СТАН ДОДАТКУ ===== */
        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--text-muted);
            font-size: 16px;
            border: 1px dashed var(--border);
            border-radius: 16px;
        }

        #fileInput {
            display: none;
        }

        /* ===== СПОВІЩЕННЯ ТА МАКСИМАЛЬНО СТРОГІ ВІКНА ===== */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: calc(100% - 40px);
            max-width: 400px;
            pointer-events: none;
        }

        .toast-item {
            pointer-events: auto;
            background: var(--modal-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--modal-border);
            color: #ffffff;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            letter-spacing: -0.2px;
        }

        .toast-item.hide {
            animation: fadeOut 0.2s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-10px) scale(0.96); }
        }

        /* Модальне вікно */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 340px;
            border-radius: 16px;
            overflow: hidden;
            text-align: center;
            transform: scale(0.95);
            transition: transform 0.2s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-content {
            padding: 24px 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .modal-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 15px;
            color: #ffffff;
            outline: none;
            margin-top: 12px;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: #ffffff;
        }

        .modal-input::placeholder {
            color: var(--text-muted);
        }

        .modal-actions {
            display: flex;
            border-top: 1px solid var(--border);
        }

        .modal-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            outline: none;
            transition: background 0.2s, color 0.2s;
        }

        .modal-btn:hover {
            background: var(--surface-hover);
            color: var(--text-main);
        }

        .modal-btn.confirm-action {
            color: #ffffff;
            font-weight: 500;
        }

        .modal-btn.confirm-action:hover {
            background: var(--surface-hover);
            color: #ffffff;
        }

        .modal-btn.cancel-action {
            color: #ffffff;
        }

        .modal-btn.cancel-action:hover {
            background: var(--surface-hover);
            color: #ffffff;
        }

        .modal-btn + .modal-btn {
            border-left: 1px solid var(--border);
        }

        /* ===== МОБІЛЬНІ АДАПТАЦІЇ ===== */
        @media (max-width: 600px) {
            body { 
                padding: 24px 12px; 
            }
            
            .add-cat-form { 
                flex-direction: column; 
            }
            
            .add-cat-form .btn {
                width: 100%;
            }
            
            .control-bar { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 12px; 
            }
            
            .control-group { 
                width: 100%; 
            }
            
            .btn-sm { 
                flex: 1; 
                text-align: center; 
            }
            
            .add-item-form { 
                flex-direction: column; 
            }
            
            .add-item-form input {
                width: 100%;
            }
            
            .add-item-form select {
                width: 100%;
            }
            
            .add-item-form button {
                width: 100%;
                padding: 12px 16px;
                min-height: 44px;
            }
            
            .category-header {
                padding: 14px 16px;
            }
            
            .category-body {
                padding: 12px 16px;
            }
        }

        @media (max-width: 400px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .logo {
                font-size: 24px;
            }
            
            .category-name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- ШАПКА -->
    <div class="header">
        <div class="logo">
            <span class="logo-symbol">●</span> AniNote
        </div>
        <div class="stats">
            Всього тайтлів: <strong id="totalCount">0</strong>
        </div>
    </div>

    <!-- СТВОРЕННЯ НОВОЇ КАТЕГОРІЇ -->
    <form class="add-cat-form" id="addCatForm">
        <input type="text" id="catNameInput" placeholder="Назва нової категорії ..." required autocomplete="off">
        <button type="submit" class="btn btn-primary">Створити категорію</button>
    </form>

    <!-- ПАНЕЛЬ КЕРУВАННЯ -->
    <div class="control-bar">
        <h2>Категорії</h2>
        <div class="control-group">
            <button class="btn btn-sm btn-install" id="installBtn">📲 Встановити</button>
            <button class="btn btn-sm" id="exportBtn">Експорт</button>
            <button class="btn btn-sm" id="importBtn">Імпорт</button>
            <button class="btn btn-sm btn-danger-text" id="clearAllBtn">Очистити все</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json">

    <!-- СПИСОК КАТЕГОРІЙ -->
    <div class="categories-container" id="categoriesContainer"></div>
</div>

<!-- СПОВІЩЕННЯ -->
<div class="toast-container" id="toastContainer"></div>

<!-- МОДАЛЬНЕ ВІКНО ПІДТВЕРДЖЕННЯ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Підтвердження</div>
            <div class="modal-text" id="modalText">Ви впевнені?</div>
        </div>
        <div class="modal-actions">
            <button class="modal-btn cancel-action" id="modalCancelBtn">Скасувати</button>
            <button class="modal-btn confirm-action" id="modalConfirmBtn">Підтвердити</button>
        </div>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО РЕДАГУВАННЯ НАЗВИ -->
<div class="modal-overlay" id="editModalOverlay">
    <div class="modal-box">
        <div class="modal-content">
            <div class="modal-title" id="editModalTitle">Редагувати назву</div>
            <div class="modal-text" id="editModalText">Введіть нову назву для категорії</div>
            <input type="text" class="modal-input" id="editModalInput" placeholder="Нова назва..." autocomplete="off">
        </div>
        <div class="modal-actions">
            <button class="modal-btn cancel-action" id="editCancelBtn">Скасувати</button>
            <button class="modal-btn confirm-action" id="editSaveBtn">Зберегти</button>
        </div>
    </div>
</div>

<script>
    // ===== СИСТЕМА СПОВІЩЕНЬ МОНОХРОМ =====
    const CustomUI = {
        toast(message, duration = 2500) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-item';
            toast.innerHTML = `<span>${message}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove());
            }, duration);
        },

        confirm(title, text, onConfirm) {
            const overlay = document.getElementById('modalOverlay');
            const titleEl = document.getElementById('modalTitle');
            const textEl = document.getElementById('modalText');
            const confirmBtn = document.getElementById('modalConfirmBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');

            titleEl.textContent = title;
            textEl.textContent = text;

            overlay.classList.add('active');

            const close = () => {
                overlay.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                close();
                onConfirm();
            };

            cancelBtn.onclick = close;
        },

        editCategory(catId, currentName, onSave) {
            const overlay = document.getElementById('editModalOverlay');
            const input = document.getElementById('editModalInput');
            const saveBtn = document.getElementById('editSaveBtn');
            const cancelBtn = document.getElementById('editCancelBtn');

            input.value = currentName;
            overlay.classList.add('active');
            setTimeout(() => {
                input.focus();
                input.select();
            }, 100);

            const close = () => {
                overlay.classList.remove('active');
                saveBtn.onclick = null;
                cancelBtn.onclick = null;
                input.onkeydown = null;
            };

            const handleSave = () => {
                const newName = input.value.trim();
                if (newName && newName !== currentName) {
                    close();
                    onSave(newName);
                } else if (!newName) {
                    CustomUI.toast('Назва не може бути порожньою');
                } else {
                    close();
                }
            };

            saveBtn.onclick = handleSave;
            cancelBtn.onclick = close;

            input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSave();
                }
                if (e.key === 'Escape') {
                    close();
                }
            };
        }
    };

    // ===== PWA MANIFEST & SERVICE WORKER =====
    (function initPWA() {
        const manifestData = {
            name: "AniNote — Блокнот аніме",
            short_name: "AniNote",
            start_url: ".",
            display: "standalone",
            background_color: "#0a0a0a",
            theme_color: "#0a0a0a",
            icons: [{
                src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%230a0a0a'/%3E%3Ccircle cx='50' cy='50' r='20' fill='%23ffffff'/%3E%3C/svg%3E",
                sizes: "512x512",
                type: "image/svg+xml"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL).catch(() => {});
        }
    })();

    // ===== ОСНОВНА ЛОГІКА ДОДАТКУ =====
    (function() {
        const STORAGE_KEY = 'aninote_categories_v2';
        
        let categories = [];
        let deferredPrompt = null;
        let dragData = null;

        const addCatForm = document.getElementById('addCatForm');
        const catNameInput = document.getElementById('catNameInput');
        const categoriesContainer = document.getElementById('categoriesContainer');
        const totalCountEl = document.getElementById('totalCount');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'inline-flex';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
                CustomUI.toast('Додаток успішно встановлено');
            }
            deferredPrompt = null;
        });

        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) {
                        categories = parsed;
                        return;
                    }
                } catch (_) {}
            }
            categories = [
                { id: 1, name: "Аніме", isOpen: true, items: [] },
                { id: 2, name: "У планах", isOpen: false, items: [] }
            ];
            saveToStorage();
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(categories));
        }

        function getStatusClass(status) {
            const map = {
                'Дивлюсь': 'status-watching',
                'У планах': 'status-planned',
                'Переглянуто': 'status-watched'
            };
            return map[status] || '';
        }

        function render() {
            let totalItems = 0;
            categories.forEach(c => totalItems += c.items.length);
            totalCountEl.textContent = totalItems;

            if (categories.length === 0) {
                categoriesContainer.innerHTML = `
                    <div class="empty-state">
                        Немає жодної категорії. Створіть першу категорію вище!
                    </div>
                `;
                return;
            }

            const hasMoreThanOne = categories.length > 1;

            let html = '';
            categories.forEach((cat, index) => {
                html += `
                    <div class="category-block ${cat.isOpen ? 'open' : ''}" data-cat-id="${cat.id}" data-index="${index}">
                        <div class="category-header" onclick="toggleCategory(${cat.id})">
                            <div class="category-title-group">
                                <span class="arrow-toggle">▶</span>
                                <span class="category-name">${escapeHtml(cat.name)}</span>
                                <span class="category-count">${cat.items.length}</span>
                            </div>
                            <div class="category-actions" onclick="event.stopPropagation()">
                                <button class="cat-btn drag-handle" data-cat-id="${cat.id}" title="${hasMoreThanOne ? 'Затисніть і перетягніть для зміни порядку' : 'Доступно тільки при наявності 2+ категорій'}" ${!hasMoreThanOne ? 'disabled' : ''}>⠿</button>
                                <button class="cat-btn" onclick="editCategoryName(${cat.id})" title="Редагувати назву">✎</button>
                                <button class="cat-btn" onclick="deleteCategory(${cat.id})" title="Видалити категорію">✕</button>
                            </div>
                        </div>
                        <div class="category-body">
                            <form class="add-item-form" onsubmit="addAnimeItem(event, ${cat.id})">
                                <input type="text" placeholder="Назва аніме..." required autocomplete="off" class="item-title-input">
                                <select class="item-status-select">
                                    <option value="Дивлюсь" selected>Дивлюсь</option>
                                    <option value="У планах">У планах</option>
                                    <option value="Переглянуто">Переглянуто</option>
                                </select>
                                <button type="submit">Додати</button>
                            </form>
                            <div class="anime-sublist">
                                ${renderAnimeItems(cat)}
                            </div>
                        </div>
                    </div>
                `;
            });

            categoriesContainer.innerHTML = html;
            initDragAndDrop();
        }

        function renderAnimeItems(cat) {
            if (cat.items.length === 0) {
                return `<div class="empty-substate">У цій категорії поки порожньо.</div>`;
            }

            return cat.items.map(item => {
                const isWatched = item.status === 'Переглянуто';
                const statusClass = getStatusClass(item.status);
                return `
                    <div class="anime-card ${isWatched ? 'watched' : ''}" onclick="toggleWatched(${cat.id}, ${item.id})">
                        <div class="anime-info">
                            <span class="anime-status ${statusClass}">${escapeHtml(item.status)}</span>
                            <span class="anime-title">${escapeHtml(item.title)}</span>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteAnimeItem(${cat.id}, ${item.id})" title="Видалити">✕</button>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function generateId() {
            return Date.now() + Math.floor(Math.random() * 1000);
        }

        // ===== DRAG & DROP ДЛЯ КАТЕГОРІЙ =====
        function initDragAndDrop() {
            const dragHandles = document.querySelectorAll('.drag-handle:not(:disabled)');
            
            dragHandles.forEach(handle => {
                handle.removeEventListener('mousedown', dragStart);
                handle.removeEventListener('touchstart', dragStartTouch);
                
                handle.addEventListener('mousedown', dragStart);
                handle.addEventListener('touchstart', dragStartTouch, { passive: false });
            });
        }

        function dragStart(e) {
            e.preventDefault();
            const button = e.currentTarget;
            const catId = parseInt(button.dataset.catId);
            startDrag(catId, e.clientX, e.clientY);
        }

        function dragStartTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const button = e.currentTarget;
            const catId = parseInt(button.dataset.catId);
            startDrag(catId, touch.clientX, touch.clientY);
        }

        function startDrag(catId, startX, startY) {
            const index = categories.findIndex(c => c.id === catId);
            if (index === -1) return;
            if (categories.length <= 1) return;

            const openState = {};
            categories.forEach(c => {
                openState[c.id] = c.isOpen;
            });

            dragData = {
                catId: catId,
                startIndex: index,
                startX: startX,
                startY: startY,
                isDragging: false,
                threshold: 15,
                openState: openState
            };

            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchmove', dragMoveTouch, { passive: false });
            document.addEventListener('touchend', dragEndTouch, { passive: false });
        }

        function dragMove(e) {
            e.preventDefault();
            if (!dragData) return;
            checkDragStart(e.clientX, e.clientY);
            if (dragData.isDragging) {
                handleDrag(e.clientX, e.clientY);
            }
        }

        function dragMoveTouch(e) {
            e.preventDefault();
            if (!dragData) return;
            const touch = e.touches[0];
            checkDragStart(touch.clientX, touch.clientY);
            if (dragData.isDragging) {
                handleDrag(touch.clientX, touch.clientY);
            }
        }

        function checkDragStart(clientX, clientY) {
            if (!dragData || dragData.isDragging) return;
            
            const dx = clientX - dragData.startX;
            const dy = clientY - dragData.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > dragData.threshold) {
                dragData.isDragging = true;
                
                categories.forEach(c => c.isOpen = false);
                saveToStorage();
                
                document.querySelectorAll('.category-block').forEach(block => {
                    block.classList.remove('open');
                });
                
                const blocks = document.querySelectorAll('.category-block');
                blocks.forEach(block => {
                    if (parseInt(block.dataset.catId) === dragData.catId) {
                        block.classList.add('dragging');
                    }
                });
            }
        }

        function handleDrag(clientX, clientY) {
            if (!dragData || !dragData.isDragging) return;

            const elements = document.elementsFromPoint(clientX, clientY);
            let targetBlock = null;
            
            for (let el of elements) {
                if (el.classList && el.classList.contains('category-block')) {
                    targetBlock = el;
                    break;
                }
            }

            document.querySelectorAll('.category-block.drag-over').forEach(el => {
                el.classList.remove('drag-over');
            });

            if (targetBlock) {
                const targetId = parseInt(targetBlock.dataset.catId);
                if (targetId !== dragData.catId) {
                    targetBlock.classList.add('drag-over');
                    dragData.targetId = targetId;
                } else {
                    dragData.targetId = null;
                }
            } else {
                dragData.targetId = null;
            }
        }

        function dragEnd(e) {
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('mouseup', dragEnd);
            finishDrag();
        }

        function dragEndTouch(e) {
            document.removeEventListener('touchmove', dragMoveTouch);
            document.removeEventListener('touchend', dragEndTouch);
            finishDrag();
        }

        function finishDrag() {
            if (dragData && dragData.isDragging && dragData.targetId !== undefined && dragData.targetId !== null) {
                const fromIndex = categories.findIndex(c => c.id === dragData.catId);
                const toIndex = categories.findIndex(c => c.id === dragData.targetId);
                
                if (fromIndex !== -1 && toIndex !== -1 && fromIndex !== toIndex) {
                    const [item] = categories.splice(fromIndex, 1);
                    categories.splice(toIndex, 0, item);
                    saveToStorage();
                    render();
                    CustomUI.toast('Порядок категорій змінено');
                }
            }

            if (dragData && dragData.openState) {
                categories.forEach(c => {
                    if (dragData.openState.hasOwnProperty(c.id)) {
                        c.isOpen = dragData.openState[c.id];
                    }
                });
                saveToStorage();
            }

            document.querySelectorAll('.category-block.dragging, .category-block.drag-over').forEach(el => {
                el.classList.remove('dragging', 'drag-over');
            });

            render();
            dragData = null;
        }

        // ===== ФУНКЦІЇ КАТЕГОРІЙ =====
        window.toggleCategory = function(catId) {
            const cat = categories.find(c => c.id === catId);
            if (cat) {
                cat.isOpen = !cat.isOpen;
                saveToStorage();
                render();
            }
        };

        window.editCategoryName = function(catId) {
            const cat = categories.find(c => c.id === catId);
            if (!cat) return;

            CustomUI.editCategory(catId, cat.name, (newName) => {
                cat.name = newName;
                saveToStorage();
                render();
                CustomUI.toast(`Назву змінено на "${newName}"`);
            });
        };

        window.deleteCategory = function(catId) {
            const cat = categories.find(c => c.id === catId);
            if (!cat) return;

            CustomUI.confirm(
                'Видалити категорію',
                `Видалити категорію "${cat.name}" разом із усіма її записами (${cat.items.length})?`,
                () => {
                    categories = categories.filter(c => c.id !== catId);
                    saveToStorage();
                    render();
                    CustomUI.toast(`Категорію видалено`);
                }
            );
        };

        addCatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = catNameInput.value.trim();
            if (!name) return;

            categories.push({
                id: generateId(),
                name: name,
                isOpen: true,
                items: []
            });

            saveToStorage();
            render();
            catNameInput.value = '';
            CustomUI.toast(`Створено категорію: "${name}"`);
        });

        // ===== ФУНКЦІЇ АНІМЕ ЕЛЕМЕНТІВ =====
        window.addAnimeItem = function(event, catId) {
            event.preventDefault();
            const form = event.target;
            const titleInput = form.querySelector('.item-title-input');
            const statusSelect = form.querySelector('.item-status-select');

            const title = titleInput.value.trim();
            if (!title) return;

            const cat = categories.find(c => c.id === catId);
            if (cat) {
                cat.items.push({
                    id: generateId(),
                    title: title,
                    status: statusSelect.value
                });
                saveToStorage();
                render();
                CustomUI.toast(`Додано: "${title}"`);
            }
        };

        window.toggleWatched = function(catId, itemId) {
            const cat = categories.find(c => c.id === catId);
            if (!cat) return;
            const item = cat.items.find(i => i.id === itemId);
            if (!item) return;

            const statuses = ['Дивлюсь', 'Переглянуто', 'У планах'];
            const currentIndex = statuses.indexOf(item.status);
            const nextIndex = (currentIndex + 1) % statuses.length;
            item.status = statuses[nextIndex];
            
            saveToStorage();
            render();
            CustomUI.toast(`Статус: ${item.status}`);
        };

        window.deleteAnimeItem = function(catId, itemId) {
            const cat = categories.find(c => c.id === catId);
            if (!cat) return;

            const item = cat.items.find(i => i.id === itemId);
            cat.items = cat.items.filter(i => i.id !== itemId);
            saveToStorage();
            render();
            if (item) CustomUI.toast(`Видалено: "${item.title}"`);
        };

        // ===== ЕКСПОРТ / ІМПОРТ / ОЧИЩЕННЯ =====
        function clearAll() {
            if (categories.length === 0) {
                CustomUI.toast('Все вже порожньо');
                return;
            }
            CustomUI.confirm(
                'Очистити все',
                'Ви впевнені, що хочете повністю видалити ВСІ категорії та записи?',
                () => {
                    categories = [];
                    saveToStorage();
                    render();
                    CustomUI.toast('Усі дані видалено');
                }
            );
        }

        function exportData() {
            if (categories.length === 0) {
                CustomUI.toast('Нічого експортувати');
                return;
            }

            const dataStr = JSON.stringify(categories, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `aninote_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            CustomUI.toast('Файл збережено');
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) {
                        CustomUI.toast('Некоректний формат файлу');
                        return;
                    }

                    CustomUI.confirm(
                        'Імпорт даних',
                        `Замінити всі дані на ${imported.length} категорій з файлу?`,
                        () => {
                            categories = imported;
                            saveToStorage();
                            render();
                            CustomUI.toast('Успішно імпортовано');
                        }
                    );
                } catch (err) {
                    CustomUI.toast('Помилка зчитування файлу');
                }
            };
            reader.readAsText(file);
        }

        clearAllBtn.addEventListener('click', clearAll);
        exportBtn.addEventListener('click', exportData);
        importBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                importData(this.files[0]);
                this.value = '';
            }
        });

        loadFromStorage();
        render();
    })();
</script>
